{% extends "admin/base_site.html" %}

{% block content %}
<div style="max-width:480px;">
  <h1>Set Site Password</h1>

  <div class="help" style="padding:1em;background:#e8f4fd;border:1px solid #90cbe8;border-radius:4px;margin:1.5em 0;">
    Enter a new password below. It will be hashed with PBKDF2 and saved to <code>.env</code> as
    <code>SITE_PASSWORD_HASH</code>. The change takes effect immediately — no server restart needed.
  </div>

  <form method="post">
    {% csrf_token %}
    <div style="margin-bottom:1em;">
      <label for="password" style="display:block;font-weight:bold;margin-bottom:0.3em;">New Password</label>
      <input type="password" id="password" name="password" autocomplete="new-password"
             style="width:100%;padding:0.5em;border:1px solid #ccc;border-radius:4px;font-size:1em;" required />
    </div>
    <div style="margin-bottom:1.5em;">
      <label for="password_confirm" style="display:block;font-weight:bold;margin-bottom:0.3em;">Confirm Password</label>
      <input type="password" id="password_confirm" name="password_confirm" autocomplete="new-password"
             style="width:100%;padding:0.5em;border:1px solid #ccc;border-radius:4px;font-size:1em;" required />
    </div>
    <input type="submit" value="Save Password" class="button default">
    &nbsp;
    <a href="{% url 'admin:tracker_game_changelist' %}" class="button">Cancel</a>
  </form>
</div>
{% endblock %}
