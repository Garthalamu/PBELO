<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PBELO — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Figtree:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0b0f16;
        --surface: #161e2e;
        --surface-hi: #1e2a3f;
        --border: #2c3d56;
        --border-hi: #3d5270;
        --accent: #c9f135;
        --accent-dim: rgba(201, 241, 53, 0.13);
        --accent-glow: rgba(201, 241, 53, 0.25);
        --txt: #f0f4ff;
        --txt-2: #90a8c8;
        --txt-3: #5a7296;
        --loss: #fb7185;
        --loss-dim: rgba(251, 113, 133, 0.13);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--bg);
        color: var(--txt);
        font-family: "Figtree", sans-serif;
        font-size: 15px;
        line-height: 1.6;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background:
          repeating-linear-gradient(
            0deg,
            transparent,
            transparent 79px,
            rgba(255, 255, 255, 0.025) 79px,
            rgba(255, 255, 255, 0.025) 80px
          ),
          repeating-linear-gradient(
            90deg,
            transparent,
            transparent 79px,
            rgba(255, 255, 255, 0.025) 79px,
            rgba(255, 255, 255, 0.025) 80px
          );
        pointer-events: none;
        z-index: 0;
      }

      .login-wrap {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 380px;
        padding: 1.5rem;
      }

      .login-brand {
        text-align: center;
        margin-bottom: 2rem;
      }

      .login-brand .wordmark {
        font-family: "Bebas Neue", sans-serif;
        font-size: 3rem;
        letter-spacing: 0.06em;
        color: var(--accent);
        display: block;
        line-height: 1;
      }

      .login-brand .sub {
        color: var(--txt-3);
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin-top: 0.25rem;
        display: block;
      }

      .login-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 2rem 1.75rem;
      }

      .login-title {
        font-size: 1rem;
        font-weight: 700;
        color: var(--txt-2);
        margin-bottom: 1.5rem;
        text-align: center;
        letter-spacing: 0.01em;
      }

      .form-label {
        display: block;
        font-size: 0.72rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.09em;
        color: var(--txt-2);
        margin-bottom: 0.4rem;
      }

      .form-control {
        width: 100%;
        background: var(--surface-hi);
        border: 1px solid var(--border);
        border-radius: 9px;
        padding: 0.65rem 0.9rem;
        color: var(--txt);
        font-family: "Figtree", sans-serif;
        font-size: 0.95rem;
        transition: border-color 0.15s, box-shadow 0.15s;
        -webkit-appearance: none;
        appearance: none;
      }

      .form-control:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-dim);
      }

      .form-control.is-invalid {
        border-color: var(--loss);
      }

      .error-msg {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        background: var(--loss-dim);
        border: 1px solid rgba(251, 113, 133, 0.28);
        color: var(--loss);
        border-radius: 8px;
        padding: 0.6rem 0.85rem;
        font-size: 0.82rem;
        font-weight: 500;
        margin-bottom: 1.25rem;
      }

      .btn-submit {
        display: block;
        width: 100%;
        margin-top: 1.25rem;
        padding: 0.7rem 1rem;
        background: var(--accent);
        color: #07090c;
        border: none;
        border-radius: 9px;
        font-family: "Figtree", sans-serif;
        font-weight: 700;
        font-size: 0.95rem;
        cursor: pointer;
        letter-spacing: 0.02em;
        transition: background 0.15s, transform 0.15s, box-shadow 0.15s;
      }

      .btn-submit:hover {
        background: #d9ff55;
        transform: translateY(-1px);
        box-shadow: 0 4px 20px var(--accent-glow);
      }

      .btn-submit:active {
        transform: translateY(0);
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .login-wrap { animation: fadeUp 0.35s ease both; }
    </style>
  </head>
  <body>
    <div class="login-wrap">
      <div class="login-brand">
        <span class="wordmark">PBELO</span>
        <span class="sub">Pickleball ELO Tracker</span>
      </div>

      <div class="login-card">
        <p class="login-title">Enter the site password to continue</p>

        {% if error %}
        <div class="error-msg">
          <svg width="15" height="15" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm.75-11.25a.75.75 0 00-1.5 0v4.5a.75.75 0 001.5 0v-4.5zm-.75 7a.75.75 0 110-1.5.75.75 0 010 1.5z" clip-rule="evenodd"/>
          </svg>
          {{ error }}
        </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}">
          {% csrf_token %}
          <label class="form-label" for="password">Password</label>
          <input
            class="form-control{% if error %} is-invalid{% endif %}"
            type="password"
            id="password"
            name="password"
            autofocus
            autocomplete="current-password"
          />
          <button class="btn-submit" type="submit">Enter</button>
        </form>
      </div>
    </div>
  </body>
</html>
