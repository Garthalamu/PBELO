{% extends "base.html" %}
{% block title %}Matchup Calculator — PBELO{% endblock %}

{% block extra_css %}
<style>
  .calc-wrap { max-width: 680px; margin: 0 auto; }

  /* ── GAME TYPE BADGE ─────────────────── */
  .game-type-badge {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--txt-3);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.35rem 0.85rem;
    margin-bottom: 1.2rem;
    transition: all 0.2s;
  }
  .game-type-badge.is-singles { color: #60a5fa; border-color: rgba(96,165,250,0.3); background: rgba(96,165,250,0.07); }
  .game-type-badge.is-doubles { color: #4ade80; border-color: rgba(74,222,128,0.3); background: rgba(74,222,128,0.07); }

  /* ── PLAYER LIST CARD ────────────────── */
  .matchup-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  .team-col { display: flex; flex-direction: column; }

  .team-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.85rem 1.1rem 0.6rem;
    border-bottom: 1px solid var(--border);
  }
  .team-header-right { flex-direction: row-reverse; border-left: 1px solid var(--border); }

  .team-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .t1-dot { background: #60a5fa; box-shadow: 0 0 5px rgba(96,165,250,0.6); }
  .t2-dot { background: #f87171; box-shadow: 0 0 5px rgba(248,113,113,0.6); }

  .team-lbl { font-size: 0.62rem; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; }
  .team-lbl.t1 { color: #60a5fa; }
  .team-lbl.t2 { color: #f87171; }

  .player-list {
    display: flex;
    flex-direction: column;
    padding: 0.4rem 0.5rem;
    gap: 1px;
    overflow-y: auto;
    max-height: 260px;
    scrollbar-width: thin;
    scrollbar-color: var(--border-hi) transparent;
  }
  .player-list::-webkit-scrollbar { width: 3px; }
  .player-list::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }
  .t2-list { border-left: 1px solid var(--border); }

  .pl-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.42rem 0.6rem;
    border-radius: 7px;
    border: none;
    background: none;
    cursor: pointer;
    width: 100%;
    font-family: 'Figtree', sans-serif;
    font-size: 0.84rem;
    font-weight: 500;
    color: var(--txt-2);
    transition: background 0.12s, color 0.12s;
    text-align: left;
  }
  .pl-row:hover:not(:disabled) { background: var(--surface-hi); color: var(--txt); }
  .pl-row:disabled { opacity: 0.28; cursor: default; }

  .pl-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    border: 1.5px solid var(--border-hi);
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .pl-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .pl-rating {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--txt-3);
    flex-shrink: 0;
  }

  .t1-list .pl-row.pl-selected { color: #93c5fd; background: rgba(96,165,250,0.1); font-weight: 700; }
  .t1-list .pl-row.pl-selected .pl-dot { background: #60a5fa; border-color: #60a5fa; box-shadow: 0 0 6px rgba(96,165,250,0.5); }
  .t2-list .pl-row.pl-selected { color: #fca5a5; background: rgba(248,113,113,0.1); font-weight: 700; }
  .t2-list .pl-row.pl-selected .pl-dot { background: #f87171; border-color: #f87171; box-shadow: 0 0 6px rgba(248,113,113,0.5); }

  /* ── WIN PROBABILITY ─────────────────── */
  .prob-section {
    padding: 1.1rem 1.25rem;
    border-top: 1px solid var(--border);
  }
  .prob-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 0.55rem;
    font-size: 0.8rem;
    font-weight: 700;
  }
  .prob-lbl-t1  { color: #60a5fa; }
  .prob-lbl-t2  { color: #f87171; }
  .prob-lbl-mid { color: var(--txt-3); font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.06em; }

  .prob-track {
    height: 36px;
    border-radius: 10px;
    background: linear-gradient(90deg, #c0294a, #1e1018);
    overflow: hidden;
    position: relative;
  }
  .prob-fill {
    height: 100%;
    background: linear-gradient(90deg, #1a2d45, #3b82f6);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 10px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    font-weight: 700;
    color: #fff;
  }
  .prob-t2-pct {
    position: absolute;
    top: 0; height: 100%;
    display: flex; align-items: center;
    padding-left: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem; font-weight: 700;
    color: #fff;
    pointer-events: none;
  }

  /* ── ELO PREVIEW ─────────────────────── */
  .elo-section {
    padding: 1.1rem 1.25rem;
    border-top: 1px solid var(--border);
  }
  .score-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .score-lbl    { font-size: 0.8rem; font-weight: 700; }
  .score-lbl-t1 { color: #60a5fa; }
  .score-lbl-t2 { color: #f87171; }
  .score-input {
    width: 64px;
    background: var(--surface-hi);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 0.4rem 0.6rem;
    color: var(--txt);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    text-align: center;
    -webkit-appearance: none;
    appearance: none;
  }
  .score-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
  .score-sep { color: var(--txt-3); font-size: 1.1rem; font-weight: 700; }

  .elo-table { width: 100%; border-collapse: collapse; }
  .elo-table th {
    font-size: 0.67rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--txt-3);
    padding: 0.45rem 0.75rem;
    border-bottom: 1px solid var(--border);
    text-align: left;
  }
  .elo-table td {
    padding: 0.5rem 0.75rem;
    border-bottom: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
  }
  .elo-table tbody tr:last-child td { border-bottom: none; }
  .delta-pos { color: var(--win);  font-weight: 700; }
  .delta-neg { color: var(--loss); font-weight: 700; }

  .hidden { display: none !important; }

  @media (max-width: 480px) {
    .pl-row { font-size: 0.78rem; padding: 0.38rem 0.45rem; }
    .pl-rating { display: none; }
  }
</style>
{% endblock %}

{% block content %}
<div class="calc-wrap">

  <div class="page-header fade-up">
    <h1 class="page-title">Matchup Calculator</h1>
  </div>

  <div class="fade-up delay-1">
    <span class="game-type-badge" id="game-type-badge">Select players</span>
  </div>

  <div class="card fade-up delay-2">

    <!-- Player lists -->
    <div class="matchup-grid">
      <div class="team-col">
        <div class="team-header">
          <span class="team-dot t1-dot"></span>
          <span class="team-lbl t1">Team 1</span>
        </div>
        <div class="player-list t1-list" id="t1-list"></div>
      </div>
      <div class="team-col">
        <div class="team-header team-header-right">
          <span class="team-dot t2-dot"></span>
          <span class="team-lbl t2">Team 2</span>
        </div>
        <div class="player-list t2-list" id="t2-list"></div>
      </div>
    </div>

    <!-- Win probability -->
    <div id="prob-panel" class="prob-section hidden">
      <div class="prob-header">
        <span class="prob-lbl-t1" id="lbl-t1">Team 1</span>
        <span class="prob-lbl-mid">Win Probability</span>
        <span class="prob-lbl-t2" id="lbl-t2">Team 2</span>
      </div>
      <div class="prob-track">
        <div class="prob-fill" id="prob-fill" style="width:50%">
          <span id="prob-pct1">50%</span>
        </div>
        <div class="prob-t2-pct" id="prob-pct2" style="left:50%">50%</div>
      </div>
    </div>

    <!-- Rating change preview -->
    <div id="elo-panel" class="elo-section hidden">
      <div class="score-row">
        <span class="score-lbl score-lbl-t1" id="score-lbl-t1">Team 1</span>
        <input type="number" id="score-t1" class="score-input" min="0" max="99" placeholder="0" inputmode="numeric">
        <span class="score-sep">&#8211;</span>
        <input type="number" id="score-t2" class="score-input" min="0" max="99" placeholder="0" inputmode="numeric">
        <span class="score-lbl score-lbl-t2" id="score-lbl-t2">Team 2</span>
      </div>
      <div id="elo-result"></div>
    </div>

  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
(function () {
  const PLAYERS = {{ players_json|safe }};

  // assignments: player id -> 0 | 1 (T1) | 2 (T2)
  const assignments = {};
  PLAYERS.forEach(p => { assignments[p.id] = 0; });

  const teamPlayers = t => PLAYERS.filter(p => assignments[p.id] === t);

  function gameType() {
    return (teamPlayers(1).length === 2 && teamPlayers(2).length === 2) ? 'doubles' : 'singles';
  }
  function ratingField() { return gameType() === 'doubles' ? 'doubles_ordinal' : 'singles_ordinal'; }

  // ── Player list rendering ──
  function buildRow(p, team) {
    const state      = assignments[p.id];
    const isSelected = state === team;
    const isTaken    = state !== 0 && state !== team;
    const teamFull   = teamPlayers(team).length >= 2;

    const row = document.createElement('button');
    row.type = 'button';
    row.className = 'pl-row';
    if (isSelected) row.classList.add('pl-selected');
    row.disabled = isTaken || (teamFull && !isSelected);

    const dot = document.createElement('span');
    dot.className = 'pl-dot';

    const name = document.createElement('span');
    name.className = 'pl-name';
    name.textContent = p.display_name;

    const rating = document.createElement('span');
    rating.className = 'pl-rating';
    rating.textContent = Math.round(p[ratingField()]);

    row.appendChild(dot);
    row.appendChild(name);
    row.appendChild(rating);

    row.addEventListener('click', () => {
      assignments[p.id] = isSelected ? 0 : team;
      refresh();
    });
    return row;
  }

  function renderList(containerId, team) {
    document.getElementById(containerId).replaceChildren(
      ...PLAYERS.map(p => buildRow(p, team))
    );
  }

  // ── Badge ──
  function updateBadge() {
    const t1n = teamPlayers(1).length;
    const t2n = teamPlayers(2).length;
    const badge = document.getElementById('game-type-badge');
    if (t1n === 0 && t2n === 0) {
      badge.textContent = 'Select players';
      badge.className = 'game-type-badge';
    } else if (t1n === 2 && t2n === 2) {
      badge.textContent = 'Doubles';
      badge.className = 'game-type-badge is-doubles';
    } else {
      badge.textContent = 'Singles';
      badge.className = 'game-type-badge is-singles';
    }
  }

  // ── Probability + preview ──
  function show(id, v) { document.getElementById(id).classList.toggle('hidden', !v); }
  function teamLabel(players) { return players.map(p => p.display_name).join(' & ') || '?'; }

  // Cached win probability from the last successful predict_win API call
  let _lastP1win = null;
  let _pendingFetch = null;

  async function updateCalc() {
    const t1 = teamPlayers(1);
    const t2 = teamPlayers(2);
    const type = gameType();
    const doubles = type === 'doubles';

    const t1ok = t1.length >= 1 && (!doubles || t1.length === 2);
    const t2ok = t2.length >= 1 && (!doubles || t2.length === 2);

    if (!t1ok || !t2ok) {
      show('prob-panel', false);
      show('elo-panel', false);
      _lastP1win = null;
      return;
    }

    // Abort any in-flight request before starting a new one
    if (_pendingFetch) { _pendingFetch.abort(); }
    const controller = new AbortController();
    _pendingFetch = controller;

    const t1ids = t1.map(p => p.id).join(',');
    const t2ids = t2.map(p => p.id).join(',');

    try {
      const resp = await fetch(
        `/matchup/predict/?t1=${t1ids}&t2=${t2ids}&type=${type}`,
        { signal: controller.signal }
      );
      if (!resp.ok) return;
      const data = await resp.json();
      _pendingFetch = null;
      _lastP1win = data.t1;

      const pct1 = (data.t1 * 100).toFixed(1);
      const pct2 = (data.t2 * 100).toFixed(1);
      const lbl1 = teamLabel(t1);
      const lbl2 = teamLabel(t2);

      document.getElementById('lbl-t1').textContent       = lbl1;
      document.getElementById('lbl-t2').textContent       = lbl2;
      document.getElementById('score-lbl-t1').textContent = lbl1;
      document.getElementById('score-lbl-t2').textContent = lbl2;
      document.getElementById('prob-fill').style.width    = pct1 + '%';
      document.getElementById('prob-pct1').textContent    = pct1 + '%';
      document.getElementById('prob-pct2').textContent    = pct2 + '%';
      document.getElementById('prob-pct2').style.left     = pct1 + '%';

      show('prob-panel', true);
      show('elo-panel', true);

      updateRatingPreview();
    } catch (e) {
      if (e.name !== 'AbortError') console.error('predict_win fetch failed', e);
    }
  }

  // Rating preview uses the cached _lastP1win from predict_win so the
  // expected-score used for delta calculations matches the actual model output.
  function updateRatingPreview() {
    const t1    = teamPlayers(1);
    const t2    = teamPlayers(2);
    const field = ratingField();
    const s1    = parseInt(document.getElementById('score-t1').value);
    const s2    = parseInt(document.getElementById('score-t2').value);
    const el    = document.getElementById('elo-result');
    el.replaceChildren();
    if (_lastP1win === null || isNaN(s1) || isNaN(s2) || s1 === s2 || s1 < 0 || s2 < 0) return;

    const K    = 24;
    const mov  = Math.log2(Math.abs(s1 - s2) + 1);
    const res1 = s1 > s2 ? 1 : 0;
    const d1   = K * mov * (res1 - _lastP1win);
    const d2   = K * mov * ((1 - res1) - (1 - _lastP1win));

    const table = document.createElement('table');
    table.className = 'elo-table';

    const thead = document.createElement('thead');
    const hrow  = document.createElement('tr');
    ['Player', 'Current', 'Change', 'After'].forEach(txt => {
      const th = document.createElement('th');
      th.textContent = txt;
      hrow.appendChild(th);
    });
    thead.appendChild(hrow);
    table.appendChild(thead);

    const tbody = document.createElement('tbody');
    [...t1.map(p => [p, d1]), ...t2.map(p => [p, d2])].forEach(([p, delta]) => {
      const before = p[field];
      const tr = document.createElement('tr');

      const tdName = document.createElement('td');
      tdName.textContent = p.display_name;

      const tdBefore = document.createElement('td');
      tdBefore.textContent = before.toFixed(1);

      const tdDelta = document.createElement('td');
      tdDelta.className = delta >= 0 ? 'delta-pos' : 'delta-neg';
      tdDelta.textContent = (delta >= 0 ? '+' : '') + delta.toFixed(1);

      const tdAfter = document.createElement('td');
      tdAfter.textContent = (before + delta).toFixed(1);

      tr.appendChild(tdName);
      tr.appendChild(tdBefore);
      tr.appendChild(tdDelta);
      tr.appendChild(tdAfter);
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    el.appendChild(table);
  }

  function refresh() {
    renderList('t1-list', 1);
    renderList('t2-list', 2);
    updateBadge();
    updateCalc();
  }

  // Score changes only need to re-render the preview; no new API call needed.
  document.getElementById('score-t1').addEventListener('input', updateRatingPreview);
  document.getElementById('score-t2').addEventListener('input', updateRatingPreview);

  refresh();
})();
</script>
{% endblock %}
